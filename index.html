<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="قايمة البيت">
<meta name="theme-color" content="#1D9E75">
<title>قايمة البيت</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans Arabic','Segoe UI',sans-serif;background:#f2f2ef;min-height:100vh;padding-bottom:70px}
.header{background:#fff;border-bottom:1px solid #ececec;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;gap:10px}
.header-info{flex:1;min-width:0}
.header h1{font-size:16px;font-weight:700;color:#1a1a1a}
.sync-bar{display:flex;align-items:center;gap:5px;font-size:11px;margin-top:2px}
.sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.s-ok{background:#1D9E75}.s-push{background:#F0A500;animation:blink .8s infinite}.s-err{background:#E53935}.s-offline{background:#888}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.sync-txt{color:#aaa}.refresh-btn{background:none;border:none;cursor:pointer;font-size:15px;padding:2px 4px;line-height:1;color:#aaa}
.header-left{display:flex;align-items:center;gap:6px;flex-shrink:0}
.gear-btn{background:#f5f5f2;border:1px solid #e8e8e5;border-radius:9px;padding:6px 9px;font-size:15px;cursor:pointer;line-height:1}
.tabs{display:flex;background:#f0f0ec;border-radius:10px;overflow:hidden;border:1px solid #e5e5e0}
.tab{flex:1;padding:6px 10px;border:none;cursor:pointer;font-family:inherit;font-size:11px;font-weight:500;background:transparent;color:#777;white-space:nowrap}
.tab.active{background:#fff;color:#1a1a1a;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.container{max-width:600px;margin:0 auto;padding:14px}
.budget-banner{background:#fff;border-radius:14px;border:1.5px solid #1D9E75;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.budget-label{font-size:13px;color:#555;font-weight:500}.budget-amount{font-size:24px;font-weight:700;color:#1D9E75;direction:ltr}.budget-sub{font-size:11px;color:#aaa;margin-top:2px}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.cat-card{background:#fff;border-radius:14px;border:1.5px solid #ececec;padding:14px 10px;text-align:center;cursor:pointer;position:relative;transition:all .15s}
.cat-card:active{transform:scale(.95)}.cat-card.has-pending{border-color:#1D9E75}
.c-icon{font-size:26px;margin-bottom:5px}.c-label{font-size:12px;font-weight:500;color:#444;line-height:1.3}
.badge{position:absolute;top:7px;left:7px;background:#1D9E75;color:#fff;font-size:10px;font-weight:700;border-radius:20px;padding:1px 6px}
.back-bar{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.back-btn{background:#fff;border:1px solid #e0e0e0;border-radius:10px;padding:7px 13px;font-family:inherit;font-size:13px;cursor:pointer;color:#555}
.cat-title{font-size:16px;font-weight:700;color:#1a1a1a}
.saved-section{background:#fff;border-radius:14px;border:1px solid #ececec;padding:14px;margin-bottom:12px}
.saved-section h3{font-size:12px;font-weight:500;color:#999;margin-bottom:10px}
.chips-wrap{display:flex;flex-wrap:wrap;gap:8px}
.chip-outer{display:flex;flex-direction:column;align-items:center;gap:4px}
.item-chip{padding:8px 12px;border-radius:30px;border:1.5px solid #e0e0e0;background:#fafaf8;color:#333;font-size:13px;font-family:inherit;font-weight:500;display:flex;align-items:center;gap:5px;transition:all .15s;cursor:pointer}
.item-chip:active{transform:scale(.93)}.item-chip.in-list{background:#E6F7F1;border-color:#1D9E75;color:#0F6E56}
.chip-check{font-size:13px;color:transparent}.item-chip.in-list .chip-check{color:#1D9E75}
.chip-del{font-size:11px;color:#ccc;background:none;border:none;cursor:pointer;line-height:1;padding:0 2px}
.price-badge{font-size:11px;background:#f0f0ec;color:#666;padding:2px 8px;border-radius:20px;cursor:pointer;border:none;font-family:inherit;white-space:nowrap}
.price-badge:hover{background:#e0e0de}.price-badge.no-price{color:#bbb;border:1px dashed #ddd;background:transparent}
.price-edit-row{display:flex;gap:4px;align-items:center}
.price-input{width:70px;padding:3px 8px;border-radius:8px;border:1px solid #1D9E75;font-size:12px;text-align:center;outline:none;font-family:inherit}
.price-save-btn{background:#1D9E75;color:#fff;border:none;border-radius:7px;padding:3px 8px;font-size:12px;cursor:pointer;font-family:inherit}
.add-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.fi{flex:1;min-width:120px;padding:10px 13px;border-radius:10px;border:1px solid #ddd;background:#fff;color:#1a1a1a;font-size:14px;outline:none;font-family:inherit}
.fi:focus{border-color:#1D9E75}
.sm-input{width:70px;padding:10px 8px;border-radius:10px;border:1px solid #ddd;background:#fff;color:#1a1a1a;font-size:13px;outline:none;font-family:inherit;text-align:center}
.green-btn{background:#1D9E75;color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:14px;font-family:inherit;font-weight:600;cursor:pointer;white-space:nowrap}
.green-btn:disabled{background:#9FE1CB;cursor:not-allowed}
.list-card{background:#fff;border-radius:14px;border:1px solid #ececec;overflow:hidden}
.sec-lbl{font-size:11px;font-weight:500;color:#aaa;padding:0 2px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.sec-total{font-size:11px;color:#1D9E75;font-weight:600}
.list-sec-title{font-size:11px;font-weight:500;color:#aaa;margin-bottom:8px;padding:0 2px}
.item-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid #f2f2f0}
.item-row:last-child{border-bottom:none}.item-row.done{opacity:.5}
.icat{width:28px;height:28px;border-radius:8px;background:#E6F7F1;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.iname{font-size:14px;font-weight:500;color:#1a1a1a}.item-row.done .iname{text-decoration:line-through}
.isub{font-size:11px;color:#aaa;margin-top:1px}
.item-price{font-size:12px;color:#1D9E75;font-weight:600;white-space:nowrap;direction:ltr}
.qty-ctrl{display:flex;align-items:center;background:#f5f5f2;border-radius:10px;overflow:hidden;border:1px solid #e8e8e5;flex-shrink:0}
.qty-btn{width:30px;height:30px;border:none;background:transparent;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;padding:0;line-height:1}
.qty-btn.minus{color:#aaa}.qty-btn.minus:disabled{color:#ddd;cursor:not-allowed}.qty-btn.plus{color:#1D9E75}
.qty-num{width:30px;text-align:center;font-size:13px;font-weight:700;color:#1a1a1a;user-select:none;cursor:pointer}
.qty-edit-row{display:flex;align-items:center}
.qty-edit-input{width:64px;padding:5px 6px;border-radius:10px;border:2px solid #1D9E75;font-size:13px;font-weight:700;text-align:center;outline:none;font-family:inherit;direction:ltr}
.xbtn{background:none;border:none;cursor:pointer;color:#ccc;font-size:15px;padding:3px;opacity:0;line-height:1}
.item-row:hover .xbtn{opacity:1}
.chk{width:24px;height:24px;border-radius:50%;border:2px solid #d0d0d0;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;color:transparent;transition:all .15s}
.chk.on{background:#1D9E75;border-color:#1D9E75;color:#fff}
.info-banner{background:#E6F7F1;border:1px solid #5DCAA5;border-radius:12px;padding:11px 14px;margin-bottom:14px;display:flex;gap:10px;align-items:center}
.info-banner p{font-size:13px;font-weight:500;color:#0F6E56}
.info-banner small{font-size:11px;color:#1D9E75;display:block;margin-top:2px}
.done-hdr{display:flex;justify-content:space-between;align-items:center;margin:14px 0 8px}
.clear-btn{background:none;border:none;color:#aaa;font-size:12px;cursor:pointer;font-family:inherit}
.record-btn{background:#1D9E75;color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:12px;cursor:pointer;font-family:inherit;font-weight:500}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #ececec;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;z-index:20}
.pending-count{font-size:13px;font-weight:500;color:#1a1a1a}
.pending-count b{color:#1D9E75}
/* Settings */
.settings-screen{max-width:600px;margin:0 auto;padding:14px}
.settings-title{font-size:18px;font-weight:700;color:#1a1a1a;margin-bottom:16px}
.store-list{background:#fff;border-radius:14px;border:1px solid #ececec;overflow:hidden;margin-bottom:16px}
.store-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid #f2f2f0}
.store-row:last-child{border-bottom:none}
.store-icon-big{font-size:22px;width:40px;text-align:center}
.store-name-txt{font-size:15px;font-weight:500;color:#1a1a1a;flex:1}.store-cnt{font-size:11px;color:#aaa}
.del-store-btn{background:none;border:1px solid #ffcdd2;border-radius:8px;padding:5px 10px;color:#E53935;font-size:12px;cursor:pointer;font-family:inherit}
.add-store-card{background:#fff;border-radius:14px;border:1px solid #ececec;padding:16px}
.add-store-card h3{font-size:14px;font-weight:600;color:#333;margin-bottom:12px}
.emoji-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.emoji-opt{width:40px;height:40px;border-radius:10px;border:1.5px solid #e8e8e8;background:#fafaf8;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.emoji-opt.selected{border-color:#1D9E75;background:#E6F7F1}
.add-store-row{display:flex;gap:8px}
.empty{text-align:center;padding:44px 20px;color:#aaa}
.empty .big{font-size:40px;margin-bottom:10px}
/* Search */
.search-wrap{position:relative;margin-bottom:14px}
.search-input{width:100%;padding:12px 42px 12px 14px;border-radius:14px;border:1.5px solid #ececec;background:#fff;font-size:14px;outline:none;font-family:inherit;color:#1a1a1a}
.search-input:focus{border-color:#1D9E75}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:15px;color:#bbb;pointer-events:none}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:#f0f0ec;border:none;border-radius:50%;width:22px;height:22px;font-size:12px;color:#999;cursor:pointer;display:flex;align-items:center;justify-content:center}
.search-results{background:#fff;border-radius:14px;border:1px solid #ececec;overflow:hidden;margin-bottom:16px}
.search-result-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid #f2f2f0;cursor:pointer;transition:background .1s}
.search-result-row:last-child{border-bottom:none}
.search-result-row:active{background:#f7f7f5}
.search-result-row.added{background:#F7FDF9}
.search-result-name{font-size:14px;font-weight:500;color:#1a1a1a;flex:1}
.search-result-store{font-size:11px;color:#aaa}
.search-result-price{font-size:12px;color:#1D9E75;font-weight:600;direction:ltr}
.search-add-mark{font-size:13px;color:#1D9E75}
.search-empty{text-align:center;padding:30px 20px;color:#bbb;font-size:13px}
/* Toast */
.toast-stack{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;width:100%;max-width:360px;padding:0 14px}
.toast{background:#1a1a1a;color:#fff;padding:10px 18px;border-radius:30px;font-size:13px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.18);display:flex;align-items:center;gap:8px;animation:toastIn .25s ease-out;max-width:100%}
.toast.success{background:#1D9E75}
.toast.error{background:#E53935}
.toast.info{background:#333}
@keyframes toastIn{from{opacity:0;transform:translateY(-10px) scale(.9)}to{opacity:1;transform:translateY(0) scale(1)}}
.toast.leaving{animation:toastOut .2s ease-in forwards}
@keyframes toastOut{to{opacity:0;transform:translateY(-8px) scale(.9)}}
/* Confetti */
.confetti-layer{position:fixed;inset:0;pointer-events:none;z-index:300;overflow:hidden}
.confetti-piece{position:absolute;top:-20px;border-radius:2px;animation:confettiFall linear forwards}
@keyframes confettiFall{to{transform:translateY(110vh) rotate(720deg);opacity:.3}}
/* Shopping mode */
.shop-overlay{position:fixed;inset:0;background:#f2f2ef;z-index:100;overflow-y:auto;padding-bottom:90px}
.shop-header{background:#fff;border-bottom:1px solid #ececec;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.shop-title{font-size:16px;font-weight:700;color:#1a1a1a}
.shop-budget{font-size:20px;font-weight:700;color:#1D9E75;direction:ltr}
.shop-budget-lbl{font-size:10px;color:#aaa;text-align:left}
.shop-progress{height:4px;background:#e8e8e8;margin:0}
.shop-progress-bar{height:4px;background:#1D9E75;transition:width .4s}
.shop-body{max-width:600px;margin:0 auto;padding:14px}
.shop-store-lbl{font-size:12px;font-weight:600;color:#aaa;margin:16px 0 8px;padding:0 2px;display:flex;justify-content:space-between}
.shop-store-total{color:#1D9E75}
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.shop-item{background:#fff;border-radius:16px;border:2px solid #ececec;padding:16px 14px;cursor:pointer;transition:all .15s;position:relative;active:transform scale(.95)}
.shop-item:active{transform:scale(.96)}
.shop-item.bought{background:#E6F7F1;border-color:#1D9E75;opacity:.7}
.shop-item-name{font-size:15px;font-weight:600;color:#1a1a1a;margin-bottom:6px;line-height:1.3}
.shop-item.bought .shop-item-name{text-decoration:line-through;color:#aaa}
.shop-item-meta{display:flex;align-items:center;justify-content:space-between}
.shop-item-qty{font-size:12px;color:#aaa;background:#f5f5f2;padding:2px 8px;border-radius:8px}
.shop-item-price{font-size:13px;font-weight:600;color:#1D9E75;direction:ltr}
.shop-check{position:absolute;top:10px;left:10px;width:22px;height:22px;border-radius:50%;border:2px solid #d0d0d0;background:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;color:transparent}
.shop-item.bought .shop-check{background:#1D9E75;border-color:#1D9E75;color:#fff}
.shop-footer{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #ececec;padding:12px 16px;display:flex;gap:10px;z-index:110}
.shop-end-btn{flex:1;background:#1D9E75;color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-family:inherit;font-weight:700;cursor:pointer}
.shop-cancel-btn{background:#f5f5f2;color:#888;border:1px solid #e8e8e5;border-radius:12px;padding:14px 18px;font-size:14px;font-family:inherit;font-weight:500;cursor:pointer}
.start-shop-btn{width:100%;background:#1D9E75;color:#fff;border:none;border-radius:12px;padding:16px;font-size:16px;font-family:inherit;font-weight:700;cursor:pointer;margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:8px}
.start-shop-btn:disabled{background:#9FE1CB;cursor:not-allowed}
/* Analysis */
.analysis-screen{max-width:600px;margin:0 auto;padding:14px}
.analysis-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.analysis-title{font-size:18px;font-weight:700;color:#1a1a1a}
.year-badge{font-size:11px;color:#aaa;background:#fff;border:1px solid #ececec;border-radius:8px;padding:4px 10px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:#fff;border-radius:14px;border:1px solid #ececec;padding:14px 16px}
.stat-label{font-size:11px;color:#aaa;margin-bottom:5px}
.stat-val{font-size:17px;font-weight:700;direction:ltr}
.chart-card{background:#fff;border-radius:14px;border:1px solid #ececec;padding:16px;margin-bottom:14px}
.chart-title{font-size:13px;font-weight:600;color:#333;margin-bottom:14px}
.bar-chart{display:flex;align-items:flex-end;gap:5px;height:130px;padding-bottom:22px;position:relative}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;position:relative}
.bar-val{font-size:8px;font-weight:600;margin-bottom:2px;white-space:nowrap}
.bar{width:100%;border-radius:4px 4px 0 0;transition:height .3s;min-height:0}
.bar-lbl{font-size:8px;margin-top:3px;text-align:center;position:absolute;bottom:0;white-space:nowrap}
.chart-legend{display:flex;gap:10px;font-size:10px;color:#aaa;margin-top:10px;flex-wrap:wrap}
.chart-legend span{display:flex;align-items:center;gap:3px}
.detail-card{background:#fff;border-radius:14px;border:1px solid #ececec;overflow:hidden;margin-bottom:14px}
.detail-header{padding:12px 16px;border-bottom:1px solid #f2f2f0;font-size:13px;font-weight:600;color:#333}
.month-row{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid #f5f5f3}
.month-row:last-child{border-bottom:none}
.month-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.month-name{flex:1;font-size:13px;font-weight:400;color:#555}
.month-name.active{font-weight:600;color:#1a1a1a}
.cur-badge{font-size:10px;background:#E6F7F1;color:#1D9E75;border-radius:6px;padding:1px 5px;margin-right:4px}
.month-trips{font-size:10px;color:#aaa;margin-top:1px}
.month-val{font-size:14px;font-weight:600;direction:ltr;text-align:left}
.month-change{font-size:10px;text-align:right;margin-top:1px}
.month-edit-btn{background:#f5f5f2;border:1px solid #e8e8e5;border-radius:8px;width:28px;height:28px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.month-edit-row{display:flex;align-items:center;gap:5px}
.month-edit-input{width:80px;padding:6px 8px;border-radius:8px;border:2px solid #1D9E75;font-size:13px;font-weight:600;text-align:center;outline:none;font-family:inherit;direction:ltr}
.month-act-btn{width:28px;height:28px;border-radius:8px;border:none;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.month-act-btn.save{background:#1D9E75;color:#fff}
.month-act-btn.del{background:#fdecea}
.month-act-btn.cancel{background:#f5f5f2;color:#999}
.manual-card{background:#fff;border-radius:14px;border:1px solid #ececec;padding:16px}
.manual-card h3{font-size:13px;font-weight:600;color:#333;margin-bottom:12px}
.manual-row{display:flex;gap:8px}
.sel{flex:1;padding:10px 12px;border-radius:10px;border:1px solid #ddd;background:#fff;font-size:13px;font-family:inherit;outline:none;color:#1a1a1a}
.num-input{width:90px;padding:10px 8px;border-radius:10px;border:1px solid #ddd;background:#fff;font-size:14px;text-align:center;outline:none;font-family:inherit}
/* Receipt scan */
.receipt-card{background:#fff;border-radius:14px;border:1px solid #ececec;padding:16px;margin-top:14px}
.receipt-card h3{font-size:13px;font-weight:600;color:#333;margin-bottom:4px}
.receipt-sub{font-size:11px;color:#aaa;margin-bottom:12px}
.receipt-btn{width:100%;background:#fff;border:2px dashed #1D9E75;border-radius:12px;padding:18px;color:#1D9E75;font-size:14px;font-family:inherit;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px}
.receipt-btn .ic{font-size:26px}
.receipt-loading{display:flex;flex-direction:column;align-items:center;gap:10px;padding:20px}
.receipt-spinner{width:30px;height:30px;border:3px solid #E6F7F1;border-top-color:#1D9E75;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.receipt-result{display:flex;flex-direction:column;gap:10px;align-items:center;padding:8px 0}
.receipt-img-preview{max-width:140px;max-height:140px;border-radius:10px;border:1px solid #ececec}
.receipt-amount-row{display:flex;align-items:center;gap:8px}
.receipt-amount-input{width:120px;padding:10px;border-radius:10px;border:2px solid #1D9E75;font-size:18px;font-weight:700;text-align:center;outline:none;font-family:inherit;direction:ltr}
.receipt-actions{display:flex;gap:8px;width:100%}

// ── Receipt image preprocessing: grayscale + contrast boost + upscale ──
// improves Tesseract.js OCR accuracy on faded thermal-printer receipts
function preprocessReceiptImage(dataUrl){
  return new Promise((resolve)=>{
    const img=new Image();
    img.onload=()=>{
      const scale=img.width<1100?1.6:1; // upscale small photos so small digits are sharper
      const canvas=document.createElement("canvas");
      canvas.width=Math.round(img.width*scale);
      canvas.height=Math.round(img.height*scale);
      const ctx=canvas.getContext("2d");
      ctx.drawImage(img,0,0,canvas.width,canvas.height);
      try{
        const imgData=ctx.getImageData(0,0,canvas.width,canvas.height);
        const d=imgData.data;
        const contrast=1.55;
        for(let i=0;i<d.length;i+=4){
          const gray=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
          let v=(gray-128)*contrast+128;
          v=v<0?0:v>255?255:v;
          d[i]=d[i+1]=d[i+2]=v;
        }
        ctx.putImageData(imgData,0,0);
        resolve(canvas.toDataURL("image/png"));
      }catch{
        resolve(dataUrl); // fallback to original if canvas processing fails (e.g. CORS)
      }
    };
    img.onerror=()=>resolve(dataUrl);
    img.src=dataUrl;
  });
}

// ── Firebase Anonymous Auth ────────────────────────────────
// Token cache: {idToken, refreshToken, expiresAt}
let _authCache=null;
function loadAuthCache(){
  try{const s=localStorage.getItem(FB_AUTH_KEY);return s?JSON.parse(s):null;}catch{return null;}
}
function saveAuthCache(c){
  try{localStorage.setItem(FB_AUTH_KEY,JSON.stringify(c));}catch{}
}
async function getAuthToken(){
  // Return valid cached token
  if(_authCache&&_authCache.expiresAt>Date.now()+60000) return _authCache.idToken;
  // Try refresh token from localStorage
  const stored=loadAuthCache();
  if(stored?.refreshToken){
    try{
      const r=await fetch("https://securetoken.googleapis.com/v1/token?key="+FB_API_KEY,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({grant_type:"refresh_token",refresh_token:stored.refreshToken})
      });
      if(r.ok){
        const d=await r.json();
        const cache={idToken:d.id_token,refreshToken:d.refresh_token,expiresAt:Date.now()+parseInt(d.expires_in)*1000};
        _authCache=cache;saveAuthCache(cache);
        return cache.idToken;
      }
    }catch{}
  }
  // Anonymous sign-in (first time)
  const r=await fetch("https://identitytoolkit.googleapis.com/v1/accounts:signUp?key="+FB_API_KEY,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({returnSecureToken:true})
  });
  if(!r.ok) throw new Error("auth failed");
  const d=await r.json();
  const cache={idToken:d.idToken,refreshToken:d.refreshToken,expiresAt:Date.now()+parseInt(d.expiresIn)*1000};
  _authCache=cache;saveAuthCache(cache);
  return cache.idToken;
}
async function fbUrl(){
  const token=await getAuthToken();
  return "https://home-list-96cde-default-rtdb.firebaseio.com/beit.json?auth="+token;
}

  const [delConfirm,setDelConfirm]=useState(null);  // {type,payload} for any delete
  const [editingTripVendor,setEditingTripVendor]=useState(null); // tripId being edited
  const [editTripVendorVal,setEditTripVendorVal]=useState("");
  const [receiptVendor,setReceiptVendor]=useState("");
  const [manualAmt,setManualAmt]=useState("");
  const [manualMonth,setManualMonth]=useState(CUR_MONTH);
  const [shopMode,setShopMode]=useState(false);
  const [receiptImg,setReceiptImg]=useState(null);
  const [receiptLoading,setReceiptLoading]=useState(false);
  const [receiptAmount,setReceiptAmount]=useState(null);

  // ── Theme (dark mode) ───────────────────────────────────
  function setTheme(val){

  }
  function cycleTheme(){

  }
  const darkActive=themeMode==="dark"||(themeMode==="auto"&&isNightNow());

    const meta=document.querySelector('meta[name="theme-color"]');

  },[darkActive]);

  // ── Toast notifications ────────────────────────────────
  function showToast(msg,type){
    const id=Date.now()+Math.random();
    setToasts(t=>[...t,{id,msg,type:type||"info",leaving:false}]);
    setTimeout(()=>{
      setToasts(t=>t.map(x=>x.id===id?{...x,leaving:true}:x));
      setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),200);
    },2600);
  }

  // ── Confetti ────────────────────────────────────────────
  function fireConfetti(){
    setConfetti(true);
    setTimeout(()=>setConfetti(false),2500);
  }

  const lastErrRef=useRef(false);
  const pendingDataRef=useRef(null);
  const offlineNotifiedRef=useRef(false);

  // ── Firebase: push helper (used by both debounced save & retry) ──
  async function pushNow(data){
    setSync("push");setSyncMsg("جاري الحفظ...");
    try{
      const url=await fbUrl();
      const r=await fetch(url,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)});
      if(!r.ok)throw 0;
      pendingDataRef.current=null;
      setSync("ok");setSyncMsg("تم الحفظ ✓");
      lastErrRef.current=false;
      return true;
    }catch{
      setSync("err");setSyncMsg("فشل الحفظ، هتُعاد المحاولة");
      if(!lastErrRef.current){showToast("⚠️ فشل الحفظ، هتُعاد المحاولة تلقائياً","error");lastErrRef.current=true;}
      return false;
    }
  }

  // ── Firebase: pull + flush any queued offline changes first ──
  const pull=useCallback(async()=>{
    if(!navigator.onLine){
      setSync("offline");setSyncMsg("غير متصل - هيُحفظ تلقائياً");
      return;
    }
    if(pendingDataRef.current){
      const ok=await pushNow(pendingDataRef.current);
      if(!ok)return; // will retry on next tick / online event
    }
    try{
      const url=await fbUrl();
      const r=await fetch(url);
      if(!r.ok)throw 0;
      const rec=await r.json();
      if(!rec){setSync("ok");setSyncMsg("محفوظ");lastErrRef.current=false;return;}
      const remoteTs=rec.ts||0;
      if(remoteTs>R.current.ts){
        const ni=rec.items||[];
        if(ni.length===0&&R.current.items.length>0){setSync("ok");return;}
        const nst=rec.stores||DEF_STORES;
        const ns=normSaved({...DEF_SAVED,...(rec.saved||{})});
        const nh=rec.history||{};
        const ntl=rec.tripLog||{};
        const nv=rec.vendors||[];
        setItems(ni);setStores(nst);setSaved(ns);setTs(remoteTs);setHistory(nh);setTripLog(ntl);setVendors(nv);
        lsSave({items:ni,stores:nst,saved:ns,ts:remoteTs,history:nh,tripLog:ntl,vendors:nv});
      }
      setSync("ok");setSyncMsg("محفوظ");

  function onReceiptFile(e){
    const file=e.target.files[0];
    if(!file)return;
    setReceiptErr(null);setReceiptAmount(null);
    const reader=new FileReader();
    reader.onload=async ev=>{
      const dataUrl=ev.target.result;
      setReceiptImg(dataUrl);
      setReceiptLoading(true);
      let worker=null;
      try{
        const processedUrl=await preprocessReceiptImage(dataUrl);
        worker=await Tesseract.createWorker("eng");
        const {data:{text}}=await worker.recognize(processedUrl);
        // Clean OCR text: remove currency symbols, Arabic chars, extra spaces
        const cleanText=text.replace(/[^\d.\s]/g," ").replace(/\s+/g," ");
        const matches=cleanText.match(/\d{1,4}\.\d{2}/g)||[];
        const nums=matches.map(m=>parseFloat(m.replace(/[^\d.]/g,""))).filter(n=>isFinite(n)&&n>0&&n<5000);
        if(nums.length>0){
          setReceiptAmount(Math.max(...nums));
        }else{
          const whole=(cleanText.match(/\b\d{1,4}\b/g)||[]).map(Number).filter(n=>isFinite(n)&&n>0&&n<5000);
          if(whole.length>0) setReceiptAmount(Math.max(...whole));
          else setReceiptErr("ما قدرت أقرأ رقم واضح — اكتب المبلغ يدوياً");
        }
      }catch{
        setReceiptErr("صار خطأ في قراءة الصورة");
      }finally{
        if(worker) await worker.terminate().catch(()=>{});
        setReceiptLoading(false);
      }
    };
    reader.readAsDataURL(file);
  }

        // Manual add
        h("div",{className:"manual-card"},
          h("h3",null,"✏️ إضافة مصاريف يدوياً"),
          h("div",{className:"manual-row"},
            h("select",{className:"sel",value:manualMonth,onChange:ev=>setManualMonth(parseInt(ev.target.value))},
              MONTHS.map((m,i)=>h("option",{key:i,value:i},m))
            ),
            h("input",{className:"num-input",type:"number",placeholder:"المبلغ",value:manualAmt,onChange:ev=>setManualAmt(ev.target.value),
              onKeyDown:ev=>ev.key==="Enter"&&addManualHistory()}),
            h("button",{className:"green-btn",disabled:!manualAmt||safeNum(manualAmt,0)<=0,onClick:addManualHistory},"+ أضف")
          ),
          vendors.length>0&&h("div",{className:"mini-vendor-row"},
            vendors.map(v=>h("div",{key:v,className:"mini-vendor-chip"+(manualVendor===v?" selected":""),
              onClick:()=>setManualVendor(manualVendor===v?null:v)},"🏪 "+v))
          )
        ),

        // Receipt scan
        h("div",{className:"receipt-card"},
          h("h3",null,"📷 مسح فاتورة"),
          h("div",{className:"receipt-sub"},"صوّر الفاتورة وراح يحاول يقرأ المبلغ تلقائياً — للشهر الحالي ("+MONTHS[CUR_MONTH]+")"),
          h("input",{ref:fileInputRef,type:"file",accept:"image/*",capture:"environment",style:{display:"none"},onChange:onReceiptFile}),
          !receiptImg&&h("button",{className:"receipt-btn",onClick:()=>fileInputRef.current?.click()},
            h("span",{className:"ic"},"📷"),
            h("span",null,"اضغط لتصوير الفاتورة")
          ),
          receiptImg&&receiptLoading&&h("div",{className:"receipt-loading"},
            h("img",{src:receiptImg,className:"receipt-img-preview"}),
            h("div",{className:"receipt-spinner"}),
            h("div",{style:{fontSize:12,color:"#aaa"}},"جاري قراءة الفاتورة...")
          ),
          receiptImg&&!receiptLoading&&h("div",{className:"receipt-result"},
            h("img",{src:receiptImg,className:"receipt-img-preview"}),
            receiptErr
              ? h("div",{style:{fontSize:12,color:"#E53935",textAlign:"center"}},receiptErr)
              : null,
            h("div",{className:"receipt-amount-row"},
              h("input",{className:"receipt-amount-input",type:"number",placeholder:"0.00",
                value:receiptAmount!=null?receiptAmount:"",
                onChange:ev=>setReceiptAmount(ev.target.value?parseFloat(ev.target.value):null),
                autoFocus:!!receiptErr}),
              h("span",{style:{fontSize:13,color:"#aaa"}},"د.أ")
            ),
            h("div",{className:"receipt-hint"},"تأكد من المبلغ قبل الإضافة، أو عدّله إذا لزم"),
            h("input",{className:"fi",style:{width:"100%",marginTop:8},placeholder:"🏪 اسم المحل (اختياري — مثلاً: كارفور، المحمص...)",
              value:receiptVendor||"",onChange:ev=>setReceiptVendor(ev.target.value)}),
            vendors.length>0&&h("div",{className:"mini-vendor-row"},
              vendors.map(v=>h("div",{key:v,className:"mini-vendor-chip"+(receiptVendor===v?" selected":""),
                onClick:()=>setReceiptVendor(receiptVendor===v?"":v)},"🏪 "+v))
            ),
            h("div",{className:"receipt-actions"},
              h("button",{className:"receipt-cancel-btn",onClick:cancelReceipt},"إلغاء"),
              h("button",{className:"receipt-confirm-btn",disabled:!receiptAmount||receiptAmount<=0,onClick:confirmReceipt},"✓ إضافة للمصاريف")
            )
          )
        )
      ),

      // ══ MONTH TRIPS DETAIL ══
      mode==="analysis"&&viewingMonth!=null&&h("div",{className:"analysis-screen",style:{padding:0}},
        h("div",{className:"back-bar"},
          h("button",{className:"back-btn",onClick:()=>{setViewingMonth(null);setExpandedTrip(null);}},"→ رجوع"),
          h("span",{className:"cat-title"},"رحلات "+MONTHS[viewingMonth])
        ),
        (()=>{
          const moTrips=((tripLog[CUR_YEAR]||{})[viewingMonth])||[];
          const moTotal=monthTotals[viewingMonth];
          if(moTrips.length===0){
            return h("div",{className:"empty"},
              h("div",{className:"big"},"🧾"),
              h("p",null,"ما في رحلات مسجلة بالتفصيل لهذا الشهر"),
              moTotal>0&&h("p",{style:{fontSize:12,marginTop:6}},"بس مسجل إجمالي "+moTotal.toFixed(2)+" د.أ")
            );
          }
          return h("div",null,
            h("div",{className:"list-sec-title"},moTrips.length+(moTrips.length===1?" رحلة":" رحلات")+" · إجمالي "+moTotal.toFixed(2)+" د.أ"),
            h("div",{className:"detail-card"},
              moTrips.map((trip,idx)=>{
                const isExpanded=expandedTrip===trip.id;
                const sourceIcon=trip.source==="receipt"?"📷":trip.source==="manual"?"✏️":"🛒";
                const sourceLbl=trip.source==="receipt"?"من فاتورة":trip.source==="manual"?"إدخال يدوي":"رحلة تسوق";
                const vendorLbl=trip.vendor?" · 🏪 "+trip.vendor:"";
                return h("div",{key:trip.id,style:{borderBottom:idx<moTrips.length-1?"1px solid #f5f5f3":"none"}},
                  h("div",{className:"month-row",style:{cursor:"pointer"},
                    onClick:()=>setExpandedTrip(isExpanded?null:trip.id)},
                    h("span",{style:{fontSize:18}},sourceIcon),
                    h("div",{style:{flex:1}},
                      h("div",{className:"month-name active"},
                        trip.vendor ? ("🏪 "+trip.vendor) : sourceLbl
                      ),
                      h("div",{className:"month-trips"},
                        fmtTripDate(trip.ts)
                        +(trip.vendor?" · "+sourceLbl:"")
                        +(( trip.items||[] ).length>0?" · "+( trip.items||[] ).length+" غرض":"")
                      )
                    ),
                    h("div",{className:"month-val"},trip.total.toFixed(2)+" د.أ"),
                    h("span",{style:{fontSize:11,color:"#bbb",marginRight:4}},isExpanded?"▲":"▼")
                  ),
                  isExpanded&&h("div",{style:{padding:"0 16px 14px",background:"rgba(0,0,0,0.015)"}},
                    // Vendor edit row
                    editingTripVendor===trip.id
                      ? h("div",{style:{display:"flex",gap:6,marginBottom:10},onClick:e=>e.stopPropagation()},
                          h("input",{className:"fi",placeholder:"اسم المحل...",value:editTripVendorVal,autoFocus:true,
                            onChange:ev=>setEditTripVendorVal(ev.target.value),
                            onKeyDown:ev=>{if(ev.key==="Enter")saveTripVendor(CUR_YEAR,viewingMonth,trip.id);if(ev.key==="Escape")setEditingTripVendor(null);}}),
                          h("button",{className:"green-btn",style:{padding:"10px 14px"},onClick:()=>saveTripVendor(CUR_YEAR,viewingMonth,trip.id)},"✓"),
                          h("button",{className:"month-act-btn cancel",onClick:()=>setEditingTripVendor(null)},"✕")
                        )
                      : h("button",{className:"month-edit-btn",style:{marginBottom:10,display:"flex",alignItems:"center",gap:5,padding:"5px 12px",width:"auto",borderRadius:20,fontSize:12},
                          onClick:e=>{e.stopPropagation();setEditingTripVendor(trip.id);setEditTripVendorVal(trip.vendor||"");}},
                          "✏️ "+(trip.vendor?"تعديل اسم المحل":"إضافة اسم المحل")
                        ),
                    ( trip.items||[] ).length===0
                      ? h("p",{style:{fontSize:12,color:"#bbb",padding:"6px 2px"}},"ما في تفاصيل أغراض مسجلة لهذا الإدخال")
                      : h("div",{className:"list-card",style:{marginBottom:8}},
                          (trip.items||[]).map((it,ii)=>
                            h("div",{key:ii,className:"item-row",style:{padding:"9px 12px"}},
                              h("div",{className:"icat"},siInfo(stores,it.storeId).icon),
                              h("div",{style:{flex:1}},
                                h("div",{className:"iname",style:{fontSize:13}},it.name,
                                  it.qty&&fmtQty(it.qty)!=="1"&&h("span",{className:"qbadge"},"×"+fmtQty(it.qty))
                                )
                              ),
                              it.price!=null&&h("span",{className:"item-price"},(it.price*(parseFloat(it.qty)||1)).toFixed(2)+" د.أ")
                            )
                          )
                        ),
                    h("button",{className:"del-store-btn",onClick:e=>{e.stopPropagation();deleteTrip(CUR_YEAR,viewingMonth,trip.id);}},"🗑️ حذف هذه الرحلة")
                  )
                );
              })
            )
          );
        })()
      ),
    ),

    // ── Bottom bar ──
    screen!=="settings"&&h("div",{className:"bottom-bar"},
      h("div",{className:"pending-count"},
        mode==="analysis"
          ? h("span",{style:{color:"#aaa",fontSize:12}},CUR_YEAR+" · "+activeMonths.length+" أشهر مسجلة")
          : pending.length===0?"✅ القايمة فاضية":h("span",null,h("b",null,pending.length)," طلب في انتظارك")
      ),
      mode==="analysis"&&yearTotal>0&&h("span",{style:{fontSize:13,fontWeight:700,color:"#1D9E75",direction:"ltr"}},yearTotal.toFixed(2)+" د.أ"),
      mode!=="analysis"&&total>0&&h("span",{style:{fontSize:13,fontWeight:700,color:"#1D9E75",direction:"ltr"}},total.toFixed(2)+" د.أ"),
      mode!=="analysis"&&total===0&&done.length>0&&h("button",{className:"clear-btn",onClick:clearDone},"🗑️ مسح المنجزين")
    )
  );
}

class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e};}
  render(){
    if(this.state.err){
      return React.createElement("div",{style:{padding:"40px 20px",textAlign:"center",color:"#E53935",fontFamily:"'Noto Sans Arabic',sans-serif"}},
        React.createElement("div",{style:{fontSize:40,marginBottom:12}},"⚠️"),
        React.createElement("p",{style:{fontSize:16,fontWeight:600,marginBottom:8}},"صار خطأ غير متوقع"),
        React.createElement("p",{style:{fontSize:13,color:"#888",marginBottom:16}},this.state.err.message||""),
        React.createElement("button",{
          style:{background:"#1D9E75",color:"#fff",border:"none",borderRadius:10,padding:"10px 24px",fontSize:14,cursor:"pointer"},
          onClick:()=>window.location.reload()
        },"إعادة تحميل التطبيق")
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById("app")).render(
  React.createElement(ErrorBoundary,null,React.createElement(App))
);
</script>
</body>
<script>
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("/sw.js")
      .then(reg=>{
        // Check for updates every time app loads
        reg.update();
        reg.addEventListener("updatefound",()=>{
          const newWorker=reg.installing;
          newWorker.addEventListener("statechange",()=>{
            if(newWorker.state==="installed"&&navigator.serviceWorker.controller){
              console.log("تحديث جديد متاح — سيُطبق عند إعادة الفتح");
            }
          });
        });
      })
      .catch(err=>console.warn("Service Worker registration failed:",err));
  });
}
</script>
</html>
