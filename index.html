<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="قايمة البيت">
<meta name="theme-color" content="#1D9E75">
<title>قايمة البيت</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏠</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── Design tokens ─────────────────────────────── */
:root{
  --clr:#1D9E75;          /* brand green */
  --clr-lt:#E6F7F1;       /* light green tint */
  --clr-dk:#0F6E56;       /* dark green */
  --clr-soft:#5DCAA5;     /* soft green */
  --err:#E53935;
  --warn:#F0A500;
  --blue:#5B6EE8;
  --bg:#f2f2ef;
  --card:#fff;
  --border:#ececec;
  --text:#1a1a1a;
  --sub:#aaa;
  --muted:#555;
  --input-bg:#fff;
  --chip-bg:#fafaf8;
  --btn-sec:#f5f5f2;
  --btn-sec-border:#e8e8e5;
}

/* ── Reset + base ──────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;font-family:'Noto Sans Arabic','Segoe UI',sans-serif}
body{background:var(--bg);min-height:100vh;padding-bottom:70px}

/* ── Header ────────────────────────────────────── */
.header{background:var(--card);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;gap:10px}
.header-info{flex:1;min-width:0}
.header h1{font-size:16px;font-weight:700;color:var(--text)}
.sync-bar{display:flex;align-items:center;gap:5px;font-size:11px;margin-top:2px}
.sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.s-ok{background:var(--clr)}.s-push{background:var(--warn);animation:blink .8s infinite}.s-err{background:var(--err)}.s-offline{background:#888}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.sync-txt{color:var(--sub)}.refresh-btn{background:none;border:none;cursor:pointer;font-size:15px;padding:2px 4px;line-height:1;color:var(--sub)}
.header-left{display:flex;align-items:center;gap:6px;flex-shrink:0}
.gear-btn{background:var(--btn-sec);border:1px solid var(--btn-sec-border);border-radius:9px;padding:6px 9px;font-size:15px;cursor:pointer;line-height:1}
.tabs{display:flex;background:#f0f0ec;border-radius:10px;overflow:hidden;border:1px solid #e5e5e0}
.tab{flex:1;padding:6px 10px;border:none;cursor:pointer;font-size:11px;font-weight:500;background:transparent;color:#777;white-space:nowrap}
.tab.active{background:var(--card);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}

/* ── Layout ────────────────────────────────────── */
.container{max-width:600px;margin:0 auto;padding:14px}

/* ── Budget banner ─────────────────────────────── */
.budget-banner{background:var(--card);border-radius:14px;border:1.5px solid var(--clr);padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.budget-label{font-size:13px;color:var(--muted);font-weight:500}
.budget-amount{font-size:24px;font-weight:700;color:var(--clr);direction:ltr}
.budget-sub{font-size:11px;color:var(--sub);margin-top:2px}

/* ── Category grid ─────────────────────────────── */
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.cat-card{background:var(--card);border-radius:14px;border:1.5px solid var(--border);padding:14px 10px;text-align:center;cursor:pointer;position:relative;transition:all .15s}
.cat-card:active{transform:scale(.95)}.cat-card.has-pending{border-color:var(--clr)}
.c-icon{font-size:26px;margin-bottom:5px}.c-label{font-size:12px;font-weight:500;color:#444;line-height:1.3}
.badge{position:absolute;top:7px;left:7px;background:var(--clr);color:#fff;font-size:10px;font-weight:700;border-radius:20px;padding:1px 6px}

/* ── Category screen ───────────────────────────── */
.back-bar{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.back-btn{background:var(--card);border:1px solid #e0e0e0;border-radius:10px;padding:7px 13px;font-size:13px;cursor:pointer;color:var(--muted)}
.cat-title{font-size:16px;font-weight:700;color:var(--text)}
.saved-section{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:14px;margin-bottom:12px}
.saved-section h3{font-size:12px;font-weight:500;color:#999;margin-bottom:10px}
.chips-wrap{display:flex;flex-wrap:wrap;gap:8px}
.chip-outer{display:flex;flex-direction:column;align-items:center;gap:4px}
.item-chip{padding:8px 12px;border-radius:30px;border:1.5px solid #e0e0e0;background:var(--chip-bg);color:#333;font-size:13px;font-weight:500;display:flex;align-items:center;gap:5px;transition:all .15s;cursor:pointer}
.item-chip:active{transform:scale(.93)}.item-chip.in-list{background:var(--clr-lt);border-color:var(--clr);color:var(--clr-dk)}
.chip-check{font-size:13px;color:transparent}.item-chip.in-list .chip-check{color:var(--clr)}
.chip-del{font-size:11px;color:#ccc;background:none;border:none;cursor:pointer;line-height:1;padding:0 2px}

/* ── Price badge + edit ────────────────────────── */
.price-badge{font-size:11px;background:#f0f0ec;color:#666;padding:2px 8px;border-radius:20px;cursor:pointer;border:none;white-space:nowrap}
.price-badge:hover{background:#e0e0de}.price-badge.no-price{color:#bbb;border:1px dashed #ddd;background:transparent}
.price-edit-row{display:flex;gap:4px;align-items:center}
.price-input{width:70px;padding:3px 8px;border-radius:8px;border:1px solid var(--clr);font-size:12px;text-align:center;outline:none}
.price-save-btn{background:var(--clr);color:#fff;border:none;border-radius:7px;padding:3px 8px;font-size:12px;cursor:pointer}

/* ── Add row / form inputs ─────────────────────── */
.add-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.fi{flex:1;min-width:120px;padding:10px 13px;border-radius:10px;border:1px solid #ddd;background:var(--input-bg);color:var(--text);font-size:14px;outline:none}
.fi:focus{border-color:var(--clr)}
.sm-input{width:70px;padding:10px 8px;border-radius:10px;border:1px solid #ddd;background:var(--input-bg);color:var(--text);font-size:13px;outline:none;text-align:center}
.green-btn{background:var(--clr);color:#fff;border:none;border-radius:10px;padding:10px 16px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap}
.green-btn:disabled{background:#9FE1CB;cursor:not-allowed}

/* ── List card / item row ──────────────────────── */
.list-card{background:var(--card);border-radius:14px;border:1px solid var(--border);overflow:hidden}
.sec-lbl{font-size:11px;font-weight:500;color:var(--sub);padding:0 2px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.sec-total{font-size:11px;color:var(--clr);font-weight:600}
.list-sec-title{font-size:11px;font-weight:500;color:var(--sub);margin-bottom:8px;padding:0 2px}
.item-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid #f2f2f0}
.item-row:last-child{border-bottom:none}.item-row.done{opacity:.5}
.icat{width:28px;height:28px;border-radius:8px;background:var(--clr-lt);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.iname{font-size:14px;font-weight:500;color:var(--text)}.item-row.done .iname{text-decoration:line-through}
.isub{font-size:11px;color:var(--sub);margin-top:1px}
.item-price{font-size:12px;color:var(--clr);font-weight:600;white-space:nowrap;direction:ltr}

/* ── Quantity control ──────────────────────────── */
.qty-ctrl{display:flex;align-items:center;background:var(--btn-sec);border-radius:10px;overflow:hidden;border:1px solid var(--btn-sec-border);flex-shrink:0}
.qty-btn{width:30px;height:30px;border:none;background:transparent;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center;padding:0;line-height:1}
.qty-btn.minus{color:var(--sub)}.qty-btn.minus:disabled{color:#ddd;cursor:not-allowed}.qty-btn.plus{color:var(--clr)}
.qty-num{width:30px;text-align:center;font-size:13px;font-weight:700;color:var(--text);user-select:none;cursor:pointer}
.qty-edit-row{display:flex;align-items:center}
.qty-edit-input{width:64px;padding:5px 6px;border-radius:10px;border:2px solid var(--clr);font-size:13px;font-weight:700;text-align:center;outline:none;direction:ltr}
.xbtn{background:none;border:none;cursor:pointer;color:#ccc;font-size:15px;padding:3px;opacity:0;line-height:1}
.item-row:hover .xbtn{opacity:1}
.chk{width:24px;height:24px;border-radius:50%;border:2px solid #d0d0d0;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;color:transparent;transition:all .15s}
.chk.on{background:var(--clr);border-color:var(--clr);color:#fff}

/* ── Info banner ───────────────────────────────── */
.info-banner{background:var(--clr-lt);border:1px solid var(--clr-soft);border-radius:12px;padding:11px 14px;margin-bottom:14px;display:flex;gap:10px;align-items:center}
.info-banner p{font-size:13px;font-weight:500;color:var(--clr-dk)}
.info-banner small{font-size:11px;color:var(--clr);display:block;margin-top:2px}

/* ── Done section controls ─────────────────────── */
.done-hdr{display:flex;justify-content:space-between;align-items:center;margin:14px 0 8px}
.clear-btn{background:none;border:none;color:var(--sub);font-size:12px;cursor:pointer}
.record-btn{background:var(--clr);color:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:12px;cursor:pointer;font-weight:500}

/* ── Bottom bar ────────────────────────────────── */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;z-index:20}
.pending-count{font-size:13px;font-weight:500;color:var(--text)}
.pending-count b{color:var(--clr)}

/* ── Settings screen ───────────────────────────── */
.settings-screen{max-width:600px;margin:0 auto;padding:14px}
.settings-title{font-size:18px;font-weight:700;color:var(--text);margin-bottom:16px}
.store-list{background:var(--card);border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:16px}
.store-row{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid #f2f2f0}
.store-row:last-child{border-bottom:none}
.store-icon-big{font-size:22px;width:40px;text-align:center}
.store-name-txt{font-size:15px;font-weight:500;color:var(--text);flex:1}.store-cnt{font-size:11px;color:var(--sub)}
.del-store-btn{background:none;border:1px solid #ffcdd2;border-radius:8px;padding:5px 10px;color:var(--err);font-size:12px;cursor:pointer}
.add-store-card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:16px}
.add-store-card h3{font-size:14px;font-weight:600;color:#333;margin-bottom:12px}
.emoji-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.emoji-opt{width:40px;height:40px;border-radius:10px;border:1.5px solid #e8e8e8;background:var(--chip-bg);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.emoji-opt.selected{border-color:var(--clr);background:var(--clr-lt)}
.add-store-row{display:flex;gap:8px}

/* ── Empty state ───────────────────────────────── */
.empty{text-align:center;padding:44px 20px;color:var(--sub)}
.empty .big{font-size:40px;margin-bottom:10px}

/* ── Search ────────────────────────────────────── */
.search-wrap{position:relative;margin-bottom:14px}
.search-input{width:100%;padding:12px 42px 12px 14px;border-radius:14px;border:1.5px solid var(--border);background:var(--card);font-size:14px;outline:none;color:var(--text)}
.search-input:focus{border-color:var(--clr)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:15px;color:#bbb;pointer-events:none}
.search-clear{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:#f0f0ec;border:none;border-radius:50%;width:22px;height:22px;font-size:12px;color:#999;cursor:pointer;display:flex;align-items:center;justify-content:center}
.search-results{background:var(--card);border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:16px}
.search-result-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid #f2f2f0;cursor:pointer;transition:background .1s}
.search-result-row:last-child{border-bottom:none}
.search-result-row:active{background:#f7f7f5}
.search-result-row.added{background:#F7FDF9}
.search-result-name{font-size:14px;font-weight:500;color:var(--text);flex:1}
.search-result-store{font-size:11px;color:var(--sub)}
.search-result-price{font-size:12px;color:var(--clr);font-weight:600;direction:ltr}
.search-add-mark{font-size:13px;color:var(--clr)}
.search-empty{text-align:center;padding:30px 20px;color:#bbb;font-size:13px}

/* ── Toast notifications ───────────────────────── */
.toast-stack{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;width:100%;max-width:360px;padding:0 14px}
.toast{background:#1a1a1a;color:#fff;padding:10px 18px;border-radius:30px;font-size:13px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.18);display:flex;align-items:center;gap:8px;animation:toastIn .25s ease-out;max-width:100%}
.toast.success{background:var(--clr)}.toast.error{background:var(--err)}.toast.info{background:#333}
@keyframes toastIn{from{opacity:0;transform:translateY(-10px) scale(.9)}to{opacity:1;transform:translateY(0) scale(1)}}
.toast.leaving{animation:toastOut .2s ease-in forwards}
@keyframes toastOut{to{opacity:0;transform:translateY(-8px) scale(.9)}}

/* ── Confetti ──────────────────────────────────── */
.confetti-layer{position:fixed;inset:0;pointer-events:none;z-index:300;overflow:hidden}
.confetti-piece{position:absolute;top:-20px;border-radius:2px;animation:confettiFall linear forwards}
@keyframes confettiFall{to{transform:translateY(110vh) rotate(720deg);opacity:.3}}

/* ── Shopping mode overlay ─────────────────────── */
.shop-overlay{position:fixed;inset:0;background:var(--bg);z-index:100;overflow-y:auto;padding-bottom:90px}
.shop-header{background:var(--card);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.shop-title{font-size:16px;font-weight:700;color:var(--text)}
.shop-budget{font-size:20px;font-weight:700;color:var(--clr);direction:ltr}
.shop-budget-lbl{font-size:10px;color:var(--sub);text-align:left}
.shop-progress{height:4px;background:#e8e8e8;margin:0}
.shop-progress-bar{height:4px;background:var(--clr);transition:width .4s}
.shop-body{max-width:600px;margin:0 auto;padding:14px}
.shop-store-lbl{font-size:12px;font-weight:600;color:var(--sub);margin:16px 0 8px;padding:0 2px;display:flex;justify-content:space-between}
.shop-store-total{color:var(--clr)}
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.shop-item{background:var(--card);border-radius:16px;border:2px solid var(--border);padding:16px 14px;cursor:pointer;transition:all .15s;position:relative}
.shop-item:active{transform:scale(.96)}
.shop-item.bought{background:var(--clr-lt);border-color:var(--clr);opacity:.7}
.shop-item-name{font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px;line-height:1.3}
.shop-item.bought .shop-item-name{text-decoration:line-through;color:var(--sub)}
.shop-item-meta{display:flex;align-items:center;justify-content:space-between}
.shop-item-qty{font-size:12px;color:var(--sub);background:var(--btn-sec);padding:2px 8px;border-radius:8px}
.shop-item-price{font-size:13px;font-weight:600;color:var(--clr);direction:ltr}
.shop-check{position:absolute;top:10px;left:10px;width:22px;height:22px;border-radius:50%;border:2px solid #d0d0d0;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:12px;color:transparent}
.shop-item.bought .shop-check{background:var(--clr);border-color:var(--clr);color:#fff}
.shop-footer{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);padding:12px 16px;display:flex;gap:10px;z-index:110}
.shop-end-btn{flex:1;background:var(--clr);color:#fff;border:none;border-radius:12px;padding:14px;font-size:15px;font-weight:700;cursor:pointer}
.shop-cancel-btn{background:var(--btn-sec);color:#888;border:1px solid var(--btn-sec-border);border-radius:12px;padding:14px 18px;font-size:14px;font-weight:500;cursor:pointer}
.start-shop-btn{width:100%;background:var(--clr);color:#fff;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:700;cursor:pointer;margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:8px}
.start-shop-btn:disabled{background:#9FE1CB;cursor:not-allowed}

/* ── Analysis screen ───────────────────────────── */
.analysis-screen{max-width:600px;margin:0 auto;padding:14px}
.analysis-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.analysis-title{font-size:18px;font-weight:700;color:var(--text)}
.year-badge{font-size:11px;color:var(--sub);background:var(--card);border:1px solid var(--border);border-radius:8px;padding:4px 10px}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:14px 16px}
.stat-label{font-size:11px;color:var(--sub);margin-bottom:5px}
.stat-val{font-size:17px;font-weight:700;direction:ltr}
.chart-card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:16px;margin-bottom:14px}
.chart-title{font-size:13px;font-weight:600;color:#333;margin-bottom:14px}
.bar-chart{display:flex;align-items:flex-end;gap:5px;height:130px;padding-bottom:22px;position:relative}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;position:relative}
.bar-val{font-size:8px;font-weight:600;margin-bottom:2px;white-space:nowrap}
.bar{width:100%;border-radius:4px 4px 0 0;transition:height .3s;min-height:0}
.bar-lbl{font-size:8px;margin-top:3px;text-align:center;position:absolute;bottom:0;white-space:nowrap}
.chart-legend{display:flex;gap:10px;font-size:10px;color:var(--sub);margin-top:10px;flex-wrap:wrap}
.chart-legend span{display:flex;align-items:center;gap:3px}
.detail-card{background:var(--card);border-radius:14px;border:1px solid var(--border);overflow:hidden;margin-bottom:14px}
.detail-header{padding:12px 16px;border-bottom:1px solid #f2f2f0;font-size:13px;font-weight:600;color:#333}
.month-row{display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid #f5f5f3}
.month-row:last-child{border-bottom:none}
.month-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.month-name{flex:1;font-size:13px;font-weight:400;color:var(--muted)}
.month-name.active{font-weight:600;color:var(--text)}
.cur-badge{font-size:10px;background:var(--clr-lt);color:var(--clr);border-radius:6px;padding:1px 5px;margin-right:4px}
.month-trips{font-size:10px;color:var(--sub);margin-top:1px}
.month-val{font-size:14px;font-weight:600;direction:ltr;text-align:left}
.month-change{font-size:10px;text-align:right;margin-top:1px}
.month-edit-btn{background:var(--btn-sec);border:1px solid var(--btn-sec-border);border-radius:8px;width:28px;height:28px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.month-edit-row{display:flex;align-items:center;gap:5px}
.month-edit-input{width:80px;padding:6px 8px;border-radius:8px;border:2px solid var(--clr);font-size:13px;font-weight:600;text-align:center;outline:none;direction:ltr}
.month-act-btn{width:28px;height:28px;border-radius:8px;border:none;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.month-act-btn.save{background:var(--clr);color:#fff}
.month-act-btn.del{background:#fdecea}
.month-act-btn.cancel{background:var(--btn-sec);color:#999}
.manual-card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:16px}
.manual-card h3{font-size:13px;font-weight:600;color:#333;margin-bottom:12px}
.manual-row{display:flex;gap:8px}
.sel{flex:1;padding:10px 12px;border-radius:10px;border:1px solid #ddd;background:var(--input-bg);font-size:13px;outline:none;color:var(--text)}

/* ── Trip recording: shared core used by all expense sources

function buildTripItems(doneItems){return doneItems.map(i=>({name:i.name,qty:i.qty,price:i.price,storeId:i.storeId}));}
function addTripToLog(tripLog,yr,mo,trip){
  const yrTrips=tripLog[yr]||{};
  const moTrips=yrTrips[mo]||[];
  return {...tripLog,[yr]:{...yrTrips,[mo]:[trip,...moTrips]}};
}
/**
 * recordTrip — adds a trip to both history totals and tripLog.
 * @param {object} history  - current history state
 * @param {object} tripLog  - current tripLog state
 * @param {number} amount   - JOD total
 * @param {string} source   - 'shopping'|'receipt'|'sms'|'bank'|'manual'
 * @param {string|null} vendor
 * @param {Array}  items    - list items array (empty for non-shopping sources)
 * @param {number} [atTs]   - optional timestamp override (for manual past months)
 * @returns {{nh, ntl}}     - new history and tripLog
 */
function recordTrip(history,tripLog,amount,source,vendor,items=[],atTs=null){
  const d=atTs?new Date(atTs):new Date();
  const yr=d.getFullYear().toString();
  const mo=d.getMonth();
  const yrData=history[yr]||{};
  const moData=yrData[mo]||{total:0,trips:0};
  const nh={...history,[yr]:{...yrData,[mo]:{total:moData.total+amount,trips:moData.trips+1}}};
  const trip={id:genId(),ts:atTs||Date.now(),items,total:amount,source,vendor:vendor||null};
  const ntl=addTripToLog(tripLog,yr,mo,trip);
  return {nh,ntl};
}

/* ── Receipt image preprocessing ────────────────
   Grayscale + contrast boost + upscale improves
   Tesseract accuracy on faded thermal receipts.
   ─────────────────────────────────────────────── */
function preprocessReceiptImage(dataUrl){
  return new Promise((resolve)=>{
    const img=new Image();
    img.onload=()=>{
      const scale=img.width<1100?1.6:1;
      const canvas=document.createElement("canvas");
      canvas.width=Math.round(img.width*scale);
      canvas.height=Math.round(img.height*scale);
      const ctx=canvas.getContext("2d");
      ctx.drawImage(img,0,0,canvas.width,canvas.height);
      try{
        const imgData=ctx.getImageData(0,0,canvas.width,canvas.height);
        const d=imgData.data;
        const contrast=1.55;
        for(let i=0;i<d.length;i+=4){
          const gray=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
          let v=(gray-128)*contrast+128;
          v=v<0?0:v>255?255:v;
          d[i]=d[i+1]=d[i+2]=v;
        }
        ctx.putImageData(imgData,0,0);
        resolve(canvas.toDataURL("image/png"));
      }catch{resolve(dataUrl);}
    };
    img.onerror=()=>resolve(dataUrl);
    img.src=dataUrl;
  });
}

/* ── Firebase auth: anonymous sign-in with token refresh ── */
let _authCache=null;
function loadAuthCache(){try{const s=localStorage.getItem(FB_AUTH_KEY);return s?JSON.parse(s):null;}catch{return null;}}
function saveAuthCache(c){try{localStorage.setItem(FB_AUTH_KEY,JSON.stringify(c));}catch{}}
async function getAuthToken(){
  if(_authCache&&_authCache.expiresAt>Date.now()+60000) return _authCache.idToken;
  const stored=loadAuthCache();
  if(stored?.refreshToken){
    try{
      const r=await fetch("https://securetoken.googleapis.com/v1/token?key="+FB_API_KEY,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({grant_type:"refresh_token",refresh_token:stored.refreshToken})
      });
      if(r.ok){
        const d=await r.json();
        const cache={idToken:d.id_token,refreshToken:d.refresh_token,expiresAt:Date.now()+parseInt(d.expires_in)*1000};
        _authCache=cache;saveAuthCache(cache);return cache.idToken;
      }
    }catch{}
  }
  // First-time anonymous sign-in
  const r=await fetch("https://identitytoolkit.googleapis.com/v1/accounts:signUp?key="+FB_API_KEY,{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({returnSecureToken:true})
  });
  if(!r.ok) throw new Error("auth failed");
  const d=await r.json();
  const cache={idToken:d.idToken,refreshToken:d.refreshToken,expiresAt:Date.now()+parseInt(d.expiresIn)*1000};
  _authCache=cache;saveAuthCache(cache);return cache.idToken;
}
async function fbUrl(){
  const token=await getAuthToken();
  return "https://home-list-96cde-default-rtdb.firebaseio.com/beit.json?auth="+token;

  /* ── Firebase: push ───────────────────────── */
  async function pushNow(data){
    setSync("push");setSyncMsg("جاري الحفظ...");
    try{
      const url=await fbUrl();
      const r=await fetch(url,{method:"PUT",headers:{"Content-Type":"application/json"},body:JSON.stringify(data)});
      if(!r.ok)throw 0;
      pendingDataRef.current=null;
      setSync("ok");setSyncMsg("تم الحفظ ✓");
      lastErrRef.current=false;return true;
    }catch{
      setSync("err");setSyncMsg("فشل الحفظ، هتُعاد المحاولة");
      if(!lastErrRef.current){showToast("⚠️ فشل الحفظ، هتُعاد المحاولة تلقائياً","error");lastErrRef.current=true;}
      return false;
    }
  }

  /* ── Firebase: pull + flush pending offline changes ── */
  const pull=useCallback(async()=>{
    if(!navigator.onLine){setSync("offline");setSyncMsg("غير متصل - هيُحفظ تلقائياً");return;}
    if(pendingDataRef.current){const ok=await pushNow(pendingDataRef.current);if(!ok)return;}
    try{
      const url=await fbUrl();
      const r=await fetch(url);
      if(!r.ok)throw 0;
      const rec=await r.json();
      if(!rec){setSync("ok");setSyncMsg("محفوظ");lastErrRef.current=false;return;}
      const remoteTs=rec.ts||0;
      if(remoteTs>R.current.ts){
        const ni=rec.items||[];
        if(ni.length===0&&R.current.items.length>0){setSync("ok");return;}
        const nst=rec.stores||DEF_STORES;
        const ns=normSaved({...DEF_SAVED,...(rec.saved||{})});
        const nh=rec.history||{};
        const ntl=rec.tripLog||{};
        const nv=rec.vendors||[];
        const nb=rec.monthlyBudget!=null?rec.monthlyBudget:R.current.monthlyBudget;
        setItems(ni);setStores(nst);setSaved(ns);setTs(remoteTs);setHistory(nh);setTripLog(ntl);setVendors(nv);setMonthlyBudget(nb);
        lsSave({items:ni,stores:nst,saved:ns,ts:remoteTs,history:nh,tripLog:ntl,vendors:nv,monthlyBudget:nb});
      }
      setSync("ok");setSyncMsg("محفوظ");
      if(lastErrRef.current){showToast("✓ عاد الاتصال","success");lastErrRef.current=false;}
    }catch{
      setSync("err");setSyncMsg("تعذر الاتصال");
      if(!lastErrRef.current){showToast("⚠️ تعذر الاتصال بالإنترنت","error");lastErrRef.current=true;}
    }
  },[]);

  /* ── Debounced push: waits 500ms, merges rapid changes ── */
  function schedulePush(data){
    pendingDataRef.current=data;
    if(pushTimer.current)clearTimeout(pushTimer.current);
    if(!navigator.onLine){setSync("offline");setSyncMsg("غير متصل - هيُحفظ تلقائياً");return;}
    setSync("push");setSyncMsg("جاري الحفظ...");
    pushTimer.current=setTimeout(()=>{pushNow(pendingDataRef.current);},500);
  }

  /* ── commit: single entry point for all state mutations ── */
  function commit(ni,ns,nst,nh,ntl,nv,nb){
    const newTs=Date.now();
    const nh2=nh||R.current.history;
    const ntl2=ntl||R.current.tripLog;
    const nv2=nv||R.current.vendors;
    const nb2=nb!=null?nb:R.current.monthlyBudget;
    setItems(ni);setSaved(ns);setStores(nst);setTs(newTs);setHistory(nh2);setTripLog(ntl2);setVendors(nv2);setMonthlyBudget(nb2);
    const data={items:ni,saved:ns,stores:nst,ts:newTs,history:nh2,tripLog:ntl2,vendors:nv2,monthlyBudget:nb2};
    lsSave(data);schedulePush(data);
  }

  /* ── Online/offline listeners ─────────────── */
  useEffect(()=>{
    function handleOnline(){
      offlineNotifiedRef.current=false;
      showToast("✓ عاد الاتصال، جاري المزامنة...","success");pull();
    }
    function handleOffline(){
      setSync("offline");setSyncMsg("غير متصل - هيُحفظ تلقائياً");
      if(!offlineNotifiedRef.current){
        showToast("📴 انقطع الاتصال — التغييرات هتتحفظ وتترسل تلقائياً عند رجوع النت","info");
        offlineNotifiedRef.current=true;
      }
    }
    window.addEventListener("online",handleOnline);
    window.addEventListener("offline",handleOffline);
    if(!navigator.onLine)handleOffline();
    return()=>{window.removeEventListener("online",handleOnline);window.removeEventListener("offline",handleOffline);};
  },[pull]);

  /* ── Receipt OCR ──────────────────────────── */
  function onReceiptFile(e){
    const file=e.target.files[0];if(!file)return;
    setReceiptErr(null);setReceiptAmount(null);
    const reader=new FileReader();
    reader.onload=async ev=>{
      const dataUrl=ev.target.result;
      setReceiptImg(dataUrl);setReceiptLoading(true);
      let worker=null;
      try{
        const processedUrl=await preprocessReceiptImage(dataUrl);
        worker=await Tesseract.createWorker(["eng","ara"]);
        const {data:{text}}=await worker.recognize(processedUrl);
        const cleanText=text.replace(/[^\d.\s]/g," ").replace(/\s+/g," ");
        const matches=cleanText.match(/\d{1,4}\.\d{2}/g)||[];
        const nums=matches.map(m=>parseFloat(m.replace(/[^\d.]/g,""))).filter(n=>isFinite(n)&&n>0&&n<5000);
        if(nums.length>0){setReceiptAmount(Math.max(...nums));}
        else{
          const whole=(cleanText.match(/\b\d{1,4}\b/g)||[]).map(Number).filter(n=>isFinite(n)&&n>0&&n<5000);
          if(whole.length>0) setReceiptAmount(Math.max(...whole));
          else setReceiptErr("ما قدرت أقرأ رقم واضح — اكتب المبلغ يدوياً");
        }
      }catch{setReceiptErr("صار خطأ في قراءة الصورة");}
      finally{if(worker)await worker.terminate().catch(()=>{});setReceiptLoading(false);}
    };
    reader.readAsDataURL(file);
  }

/* ── Error boundary: catches render errors gracefully ── */
class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return{err:e};}
  render(){
    if(this.state.err){
      return React.createElement("div",{style:{padding:"40px 20px",textAlign:"center",color:"#E53935",fontFamily:"'Noto Sans Arabic',sans-serif"}},
        React.createElement("div",{style:{fontSize:40,marginBottom:12}},"⚠️"),
        React.createElement("p",{style:{fontSize:16,fontWeight:600,marginBottom:8}},"صار خطأ غير متوقع"),
        React.createElement("p",{style:{fontSize:13,color:"#888",marginBottom:16}},this.state.err.message||""),
        React.createElement("button",{
          style:{background:"#1D9E75",color:"#fff",border:"none",borderRadius:10,padding:"10px 24px",fontSize:14,cursor:"pointer"},
          onClick:()=>window.location.reload()
        },"إعادة تحميل التطبيق")
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById("app")).render(
  React.createElement(ErrorBoundary,null,React.createElement(App))
);
</script>
</body>
<script>
/* ── Service Worker registration (PWA offline support) ── */
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("/sw.js")
      .then(reg=>{
        reg.update();
        reg.addEventListener("updatefound",()=>{
          const nw=reg.installing;
          nw.addEventListener("statechange",()=>{
            if(nw.state==="installed"&&navigator.serviceWorker.controller)
              console.log("تحديث جديد متاح — سيُطبق عند إعادة الفتح");
          });
        });
      })
      .catch(err=>console.warn("Service Worker registration failed:",err));
  });
}
</script>
